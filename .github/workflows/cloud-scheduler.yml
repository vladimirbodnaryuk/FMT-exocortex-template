name: IWE Cloud Scheduler (базовый)

# Облачный планировщик IWE — базовый уровень (без LLM).
# Выполняет задачи, которые не требуют Claude API:
# - Backup memory/ и CLAUDE.md в exocortex/
# - Health check ночной автоматики
#
# Для пользователей шаблона FMT-exocortex-template.
# Подробности: DP.SC.019 (PACK-digital-platform/08-use-cases/)
#
# Настройка:
# 1. Создайте GitHub Secret: STRATEGY_REPO_TOKEN (PAT с доступом к DS-strategy)
# 2. Укажите STRATEGY_REPO в env ниже (ваш DS-strategy репо)

on:
  schedule:
    # 01:00 UTC (04:00 MSK) — ночной цикл
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Задача для запуска'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - backup
          - health-check

env:
  # Пользователь должен указать свой DS-strategy репо
  STRATEGY_REPO: ${{ vars.STRATEGY_REPO || '' }}
  TZ: Europe/Moscow

permissions:
  contents: read

jobs:
  backup-memory:
    name: Backup memory → exocortex
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.task == 'all' ||
      github.event.inputs.task == 'backup'
    steps:
      - name: Checkout strategy repo
        if: env.STRATEGY_REPO != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ env.STRATEGY_REPO }}
          token: ${{ secrets.STRATEGY_REPO_TOKEN }}
          fetch-depth: 1

      - name: Backup memory files
        if: env.STRATEGY_REPO != ''
        run: |
          DATE=$(date +%Y-%m-%d)
          BACKUP_DIR="exocortex"

          mkdir -p "$BACKUP_DIR"

          # Копируем memory/ файлы если есть
          if [ -d "memory" ]; then
            echo "Backing up memory/ files..."
            for f in memory/*.md; do
              [ -f "$f" ] && cp "$f" "$BACKUP_DIR/$(basename "$f")"
            done
            echo "✓ Memory files backed up"
          fi

          # Копируем CLAUDE.md из корня workspace если есть
          if [ -f "CLAUDE.md" ]; then
            cp "CLAUDE.md" "$BACKUP_DIR/CLAUDE.md"
            echo "✓ CLAUDE.md backed up"
          fi

          # Проверяем, есть ли изменения
          if git diff --quiet -- "$BACKUP_DIR/"; then
            echo "No changes to backup"
          else
            git config user.name "IWE Cloud Scheduler"
            git config user.email "cloud-scheduler@iwe.local"
            git add "$BACKUP_DIR/"
            git commit -m "backup: memory → exocortex ($DATE)"
            git push
            echo "✓ Backup committed and pushed"
          fi

      - name: Skip (no strategy repo configured)
        if: env.STRATEGY_REPO == ''
        run: |
          echo "⚠️ STRATEGY_REPO не настроен. Укажите в Settings → Variables → STRATEGY_REPO"
          echo "Формат: username/repo-name"

  health-check:
    name: Health check (ночная автоматика)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.task == 'all' ||
      github.event.inputs.task == 'health-check'
    steps:
      - name: Checkout strategy repo
        if: env.STRATEGY_REPO != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ env.STRATEGY_REPO }}
          token: ${{ secrets.STRATEGY_REPO_TOKEN }}
          fetch-depth: 100

      - name: Checkout additional repos
        if: env.STRATEGY_REPO != ''
        env:
          GH_TOKEN: ${{ secrets.STRATEGY_REPO_TOKEN }}
          # Через запятую: owner/repo. Пользователь указывает свои репо.
          HEALTH_CHECK_REPOS: ${{ vars.HEALTH_CHECK_REPOS || '' }}
        run: |
          mkdir -p /tmp/repos
          # Копируем текущий (strategy) репо
          REPO_NAME="${STRATEGY_REPO##*/}"
          [ -z "$REPO_NAME" ] && REPO_NAME="strategy"
          cp -r . /tmp/repos/"$REPO_NAME"

          # Дополнительные репо (если указаны)
          if [ -n "$HEALTH_CHECK_REPOS" ]; then
            IFS=',' read -ra REPOS <<< "$HEALTH_CHECK_REPOS"
            for REPO in "${REPOS[@]}"; do
              REPO=$(echo "$REPO" | tr -d ' ')
              NAME=$(basename "$REPO")
              git clone --depth 50 --single-branch "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" "/tmp/repos/$NAME" 2>/dev/null || echo "SKIP: $REPO"
            done
          fi

      - name: Generate health report
        if: env.STRATEGY_REPO != ''
        id: health
        env:
          BOT_HEALTH_URL: ${{ vars.BOT_HEALTH_URL || '' }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          WARNINGS=0

          echo "🏥 <b>IWE Health Check</b> — $(date +'%d %b %Y (%A)')" > /tmp/health.txt
          echo "" >> /tmp/health.txt

          # ── 1. Git: коммиты за 24ч по всем репо ──
          TOTAL_COMMITS=0
          TOP_REPOS=""
          for REPO_DIR in /tmp/repos/*/; do
            [ -d "$REPO_DIR/.git" ] || continue
            NAME=$(basename "$REPO_DIR")
            COUNT=$(git -C "$REPO_DIR" log --since="24 hours ago" --oneline --no-merges 2>/dev/null | wc -l | tr -d ' ')
            TOTAL_COMMITS=$((TOTAL_COMMITS + COUNT))
            if [ "$COUNT" -gt 0 ]; then
              TOP_REPOS="${TOP_REPOS}${NAME}:${COUNT} "
            fi
          done

          echo "📊 Коммитов за 24ч: <b>$TOTAL_COMMITS</b>" >> /tmp/health.txt
          if [ -n "$TOP_REPOS" ]; then
            SORTED=$(echo "$TOP_REPOS" | tr ' ' '\n' | sort -t: -k2 -rn | head -5 | sed 's/:/ (/;s/$/)/' | tr '\n' ', ' | sed 's/, $//')
            echo "   └ топ: $SORTED" >> /tmp/health.txt
          fi

          # ── 2. Governance: DayPlan + WeekPlan ──
          DAYPLAN=$(ls current/DayPlan*${TODAY}* 2>/dev/null | head -1)
          if [ -n "$DAYPLAN" ]; then
            echo "✅ DayPlan: $(basename "$DAYPLAN")" >> /tmp/health.txt
          else
            echo "⚠️ DayPlan на сегодня не найден" >> /tmp/health.txt
            echo "dayplan_missing=true" >> "$GITHUB_OUTPUT"
            WARNINGS=$((WARNINGS + 1))
          fi

          WEEKPLAN=$(ls current/WeekPlan* 2>/dev/null | head -1)
          if [ -n "$WEEKPLAN" ]; then
            echo "✅ WeekPlan: $(basename "$WEEKPLAN")" >> /tmp/health.txt
          else
            echo "⚠️ WeekPlan не найден" >> /tmp/health.txt
            WARNINGS=$((WARNINGS + 1))
          fi

          # ── 3. Backup: exocortex ──
          if [ -d "exocortex" ]; then
            LAST_BACKUP=$(git log -1 --format="%ar" -- exocortex/ 2>/dev/null || echo "никогда")
            BACKUP_EPOCH=$(git log -1 --format="%at" -- exocortex/ 2>/dev/null || echo "0")
            NOW_EPOCH=$(date +%s)
            BACKUP_AGE_H=$(( (NOW_EPOCH - BACKUP_EPOCH) / 3600 ))
            if [ "$BACKUP_AGE_H" -gt 48 ]; then
              echo "⚠️ Backup: $LAST_BACKUP (>48ч!)" >> /tmp/health.txt
              WARNINGS=$((WARNINGS + 1))
            else
              echo "✅ Backup: $LAST_BACKUP" >> /tmp/health.txt
            fi
          fi

          # ── 4. Сессии: незакрытые ──
          if [ -f "inbox/open-sessions.log" ]; then
            OPEN_SESSIONS=$(grep -c "^[0-9]" inbox/open-sessions.log 2>/dev/null || echo "0")
            if [ "$OPEN_SESSIONS" -gt 0 ]; then
              echo "⚠️ Незакрытых сессий: $OPEN_SESSIONS" >> /tmp/health.txt
              WARNINGS=$((WARNINGS + 1))
            else
              echo "✅ Незакрытых сессий: 0" >> /tmp/health.txt
            fi
          fi

          # ── 5. Бот: health endpoint (опционально) ──
          if [ -n "$BOT_HEALTH_URL" ]; then
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$BOT_HEALTH_URL" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Бот: online ($HTTP_CODE)" >> /tmp/health.txt
            else
              echo "🔴 Бот: недоступен ($HTTP_CODE)" >> /tmp/health.txt
              WARNINGS=$((WARNINGS + 1))
            fi
          fi

          # ── 6. WP-статистика (из MEMORY.md backup) ──
          if [ -f "exocortex/MEMORY.md" ]; then
            WP_IN_PROGRESS=$(grep -c "| in_progress" exocortex/MEMORY.md 2>/dev/null || echo "0")
            WP_PENDING=$(grep -c "| pending" exocortex/MEMORY.md 2>/dev/null || echo "0")
            echo "📋 РП: <b>${WP_IN_PROGRESS}</b> в работе, <b>${WP_PENDING}</b> ожидают" >> /tmp/health.txt
          fi

          # ── 7. Активность по репо за 7 дней ──
          echo "" >> /tmp/health.txt
          echo "📈 <b>Активность за 7 дней:</b>" >> /tmp/health.txt
          for REPO_DIR in /tmp/repos/*/; do
            [ -d "$REPO_DIR/.git" ] || continue
            NAME=$(basename "$REPO_DIR")
            COUNT_7D=$(git -C "$REPO_DIR" log --since="7 days ago" --oneline --no-merges 2>/dev/null | wc -l | tr -d ' ')
            if [ "$COUNT_7D" -gt 0 ]; then
              echo "   $NAME: $COUNT_7D" >> /tmp/health.txt
            fi
          done

          # ── Светофор ──
          echo "" >> /tmp/health.txt
          if [ "$WARNINGS" -eq 0 ]; then
            echo "🟢 Всё в порядке" >> /tmp/health.txt
          elif [ "$WARNINGS" -le 2 ]; then
            echo "🟡 Требует внимания ($WARNINGS)" >> /tmp/health.txt
          else
            echo "🔴 Проблемы ($WARNINGS)" >> /tmp/health.txt
          fi

          cat /tmp/health.txt
          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/health.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Notify Telegram
        if: always() && env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          REPORT=$(cat /tmp/health.txt | head -30)

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg text "$REPORT" --arg chat "$TELEGRAM_CHAT_ID" \
              '{chat_id: $chat, text: $text, parse_mode: "HTML"}')" > /dev/null 2>&1 || true

      - name: Skip (no strategy repo configured)
        if: env.STRATEGY_REPO == ''
        run: |
          echo "⚠️ STRATEGY_REPO не настроен. Укажите в Settings → Variables → STRATEGY_REPO"
